name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# 让 GITHUB_TOKEN 拥有写 Pages 与 OIDC 权限，由 deploy-pages 使用
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一次部署，避免并发提交相互覆盖（保留最新一次执行）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # 1. Build：跑测试 + 用仓库里已提交的数据生成静态产物
  #    数据由开发者本地通过 `bun run fetch:data` 刷新后提交，
  #    CI 不再拉数据，因此不需要装 longbridge CLI 也不会触发限流。
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure Pages
        # 计算 base path 等元数据；user 站 → /，project 站 → /<repo>/
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build (copy:skills + vitepress build，使用仓库里已提交的数据)
        env:
          VITEPRESS_BASE: ${{ steps.pages.outputs.base_path }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # ──────────────────────────────────────────────
  # 2. Deploy：把 build 产物推到 GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
