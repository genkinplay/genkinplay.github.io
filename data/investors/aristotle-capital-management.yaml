bio:
  en: Aristotle Capital Management is an American investment management firm headquartered in Los Angeles, California. The firm has both equity and fixed income strategies.
  zh-CN: |-
    亚里士多德（希腊语：Αριστοτέλης，Aristotélēs，前384年6月19日—前322年3月7日），古希腊哲学家，柏拉图的学生、亚历山大大帝的老师。他及他的学派划分了后世西方许多学科，包括了物理学、形而上学、诗歌（包括戏剧）、音乐、生物学、经济学、动物学、逻辑学、政治、政府、以及伦理学。和柏拉图、苏格拉底（柏拉图的老师）一起被誉为西方哲学的奠基者。亚里士多德的著作是西方哲学的第一个广泛系统，包含道德、美学、逻辑和科学、政治和形而上学。
    亚里士多德关于物理学的思想深刻地塑造了中世纪的学术思想，其影响力延伸到了文艺复兴时期，最终被牛顿物理学取代。在动物科学方面，他的一些意见仅在19世纪被确信是准确的。他的学术领域还包括早期关于形式逻辑理论的研究，最终这些研究在19世纪被合并到了现代形式逻辑理论里。在形而上学方面，亚里士多德的哲学和神学思想在伊斯兰教和犹太教的传统上产生了深远影响，在中世纪，它继续影响着基督教神学，尤其是天主教教会的学术传统。他的伦理学，虽然自始至终都具有深刻的影响，后来也随着新兴现代美德伦理的到来获得了新生。今天亚里士多德的哲学仍然活跃在学术研究的各个方面。在经济学方面，亚里士多德对于经济活动的分类与看法持续影响到中世纪与重农主义，直到被亚当斯密的古典经济学派取代为止。虽然亚里士多德写了许多论文和优雅的对话（西塞罗描述他的文学风格为“金河”），但是大多数人认为他的著作现已失散，只有大约三分之一的原创作品保存了下来。
  zh-HK: |-
    亞里士多德（希臘語：Αριστοτέλης，Aristotélēs，前384年6月19日—前322年3月7日），古希臘哲學家，柏拉圖的學生、亞歷山大大帝的老師。他及他的學派劃分了後世西方許多學科，包括了物理學、形而上學、詩歌（包括戲劇）、音樂、生物學、經濟學、動物學、邏輯學、政治、政府、以及倫理學。和柏拉圖、蘇格拉底（柏拉圖的老師）一起被譽為西方哲學的奠基者。亞里士多德的著作是西方哲學的第一個廣泛系統，包含道德、美學、邏輯和科學、政治和形而上學。
    亞里士多德關於物理學的思想深刻地塑造了中世紀的學術思想，其影響力延伸到了文藝復興時期，最終被牛頓物理學取代。在動物科學方面，他的一些意見僅在19世紀被確信是準確的。他的學術領域還包括早期關於形式邏輯理論的研究，最終這些研究在19世紀被合併到了現代形式邏輯理論裏。在形而上學方面，亞里士多德的哲學和神學思想在伊斯蘭教和猶太教的傳統上產生了深遠影響，在中世紀，它繼續影響着基督教神學，尤其是天主教教會的學術傳統。他的倫理學，雖然自始至終都具有深刻的影響，後來也隨着新興現代美德倫理的到來獲得了新生。今天亞里士多德的哲學仍然活躍在學術研究的各個方面。在經濟學方面，亞里士多德對於經濟活動的分類與看法持續影響到中世紀與重農主義，直到被亞當斯密的古典經濟學派取代為止。雖然亞里士多德寫了許多論文和優雅的對話（西塞羅描述他的文學風格為「金河」），但是大多數人認為他的著作現已失散，只有大約三分之一的原創作品保存了下來。
