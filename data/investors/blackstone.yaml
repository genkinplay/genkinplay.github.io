bio:
  en: Blackstone Inc. is an American alternative investment management company based in New York City. It was founded in 1985 as a mergers and acquisitions firm by Peter Peterson and Stephen Schwarzman, who had previously worked together at Lehman Brothers. Blackstone's private equity business has been one of the largest investors in leveraged buyouts in the last three decades, while its real estate business has actively acquired commercial real estate across the globe. Blackstone is also active in credit, infrastructure, hedge funds, secondaries, growth equity, and insurance solutions. As of September 30, 2025, Blackstone has $1.2 trillion in total assets under management, making it the world's largest alternative investment firm.
  zh-CN: 黑石集团（英语：Blackstone Group，NYSE：BX）又译作“百仕通集团”，是美国的私人股权投资和投资管理公司，由苏世民及彼得·乔治·彼得森创建于1985年，总部位于美国纽约曼哈顿，在亚特兰大、波士顿、伦敦、杜塞尔多夫、巴黎、马德里、悉尼、东京、新加坡、北京、上海、香港、孟买和迪拜都设有办事机构。
  zh-HK: 黑石集團（英語：Blackstone Group，NYSE：BX）又譯作「百仕通集團」，是美國的私人股權投資和投資管理公司，由蘇世民及彼得·喬治·彼得森創建於1985年，總部位於美國紐約曼哈頓，在亞特蘭大、波士頓、倫敦、杜塞爾多夫、巴黎、馬德里、悉尼、東京、新加坡、北京、上海、香港、孟買和杜拜都設有辦事機構。
