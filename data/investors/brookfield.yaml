bio:
  en: "Brookfield Corporation is a Canadian multinational company that is one of the world's largest alternative investment management companies. It has over US$1\_trillion of assets under management, much of which is workers’ deferred income from global public pension funds. \nIt focuses on direct control investments in real estate, renewable power, infrastructure, credit and private equity. The company invests in distressed securities through Oaktree Capital, which it bought in 2019. Brookfield Corporation's headquarters are in Toronto, while its primary subsidiary, Brookfield Asset Management, relocated to New York City in 2024."
