bio:
  en: Castle Rock is an American supernatural horror television series, adapted from Stephen King's fictional town of Castle Rock, Maine. The series was created by Sam Shaw and Dustin Thomason, and premiered on July 25, 2018, on Hulu.
  zh-CN: 城堡石娱乐公司（英语：Castle Rock Entertainment）是一间美国电影公司，主要制作电影。城堡石娱乐公司成立于1987年，由Martin Shafer、劳勃·莱纳、Andy Scheinman、Glenn Padnick、艾伦·霍恩所创立。城堡石娱乐公司最初是个独立营运的电影公司，目前隶属于华纳媒体集团。
  zh-HK: 城堡石娛樂公司（英語：Castle Rock Entertainment）是一間美國電影公司，主要製作電影。城堡石娛樂公司成立於1987年，由Martin Shafer、勞勃·萊納、Andy Scheinman、Glenn Padnick、艾倫·霍恩所創立。城堡石娛樂公司最初是個獨立營運的電影公司，目前隸屬於華納媒體集團。
