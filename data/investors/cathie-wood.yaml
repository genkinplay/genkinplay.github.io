      zh-HK: ARKK 憑特斯拉、Square、Roku、Teladoc 取得約 150% 回報，當年全球最佳主動管理基金
  - year: 2024
    event:
      en: ARK's Bitcoin ETF (ARKB) launches alongside the first spot BTC ETF cohort
      zh-CN: ARK 比特币 ETF（ARKB）与首批现货 BTC ETF 同步上线
