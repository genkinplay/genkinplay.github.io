bio:
  en: |
    Cathie Wood, born in Los Angeles in 1955, is the founder, CEO and CIO of ARK Invest — the active ETF manager she launched in 2014 after three decades at Jennison, Tupelo and AllianceBernstein. Her central thesis is that five platforms — AI, robotics, energy storage, blockchain and multi-omic sequencing — are converging into an innovation wave on the scale of electricity and the internal combustion engine.

    ARK's flagship ARKK fund rode that thesis to a roughly 150% return in 2020, briefly making Wood the most-watched active manager in the world. The subsequent 2022 drawdown was equally dramatic, with ARKK down more than 60% from its peak as rates rose and long-duration growth de-rated. Wood kept publishing open research, held her Tesla price target higher than any sell-side analyst, and doubled down on names like Coinbase, Roku and Tempus AI through the trough.

    She is unusual among US fund managers for making her research free, her trades transparent (ARK publishes daily trade files), and her convictions loud — qualities that have made her a hero to retail investors and a lightning rod to traditional value managers.
  zh-CN: |
    凯茜·伍德，1955 年生于洛杉矶，是主动管理 ETF 公司 ARK Invest 的创始人、CEO 兼首席投资官。她在 Jennison、Tupelo 和 AllianceBernstein 积累了三十年经验后，于 2014 年创立 ARK。她的核心论点是：人工智能、机器人、储能、区块链和多组学测序这五大平台正在汇聚成一场与电力、内燃机同量级的创新浪潮。

    ARK 旗舰基金 ARKK 在 2020 年凭借这一论点取得约 150% 的回报，伍德一度成为全球最受关注的主动管理人。2022 年的回撤同样剧烈——加息周期下长久期成长股被重新定价，ARKK 自高点回撤超过 60%。伍德坚持公开研究、保留市场上最高的特斯拉目标价，并在低谷中加仓 Coinbase、Roku、Tempus AI 等重仓。

    她在美国基金经理中极为特别：研究免费开放、交易完全透明（ARK 每日披露调仓清单）、观点大声喊出来——这些特质让她成为散户眼中的英雄，也成了传统价值派眼里的"风暴眼"。
  zh-HK: |
    凱茜·伍德，1955 年生於洛杉磯，是主動管理 ETF 公司 ARK Invest 的創辦人、CEO 兼首席投資官。她在 Jennison、Tupelo 和 AllianceBernstein 累積了三十年經驗後，於 2014 年創立 ARK。她的核心論點是：人工智能、機器人、儲能、區塊鏈和多組學測序這五大平台正匯聚成一場與電力、內燃機同量級的創新浪潮。

    ARK 旗艦基金 ARKK 在 2020 年憑藉這一論點取得約 150% 回報，伍德一度成為全球最受關注的主動管理人。2022 年的回撤同樣劇烈——加息週期下長久期成長股被重新定價，ARKK 自高點回撤超過 60%。伍德堅持公開研究、保留市場上最高的特斯拉目標價，並在低谷中加倉 Coinbase、Roku、Tempus AI 等重倉。

    她在美國基金經理中極為特別：研究免費開放、交易完全透明（ARK 每日披露調倉清單）、觀點大聲喊出來——這些特質讓她成為散戶眼中的英雄，也成了傳統價值派眼裡的"風暴眼"。

philosophy:
  - icon: "🚀"
    title:
      en: Convergence of Platforms
      zh-CN: 平台的交叉叠加
      zh-HK: 平台的交叉疊加
    body:
      en: The real upside is where AI, robotics, genomics, blockchain and energy storage overlap — not any single one alone.
      zh-CN: 真正的机会在 AI、机器人、基因组学、区块链、储能五大平台的交叠处，而非单一技术。
      zh-HK: 真正的機會在 AI、機器人、基因組學、區塊鏈、儲能五大平台的交疊處，而非單一技術。
  - icon: "📉"
    title:
      en: Buy the Drawdown
      zh-CN: 越跌越买
      zh-HK: 越跌越買
    body:
      en: Exponential curves look discontinuous up close. Add to conviction when price disagrees with the trajectory.
      zh-CN: 指数曲线近看是不连续的。当价格与长期轨迹背离时，向信念加仓。
      zh-HK: 指數曲線近看是不連續的。當價格與長期軌跡背離時，向信念加倉。
  - icon: "📖"
    title:
      en: Research in the Open
      zh-CN: 研究开放
      zh-HK: 研究開放
    body:
      en: Publish the models, publish the trades, let criticism sharpen the thesis.
      zh-CN: 模型公开，交易公开，让质疑把论点打磨得更锋利。
      zh-HK: 模型公開，交易公開，讓質疑把論點打磨得更鋒利。

quotes:
  - text:
      en: Innovation solves problems. And the world has a lot of problems to solve.
      zh-CN: 创新解决问题，而这个世界有太多问题等着被解决。
      zh-HK: 創新解決問題，而這個世界有太多問題等著被解決。
  - text:
      en: We believe we are in the right stocks. The question was never the thesis — it was the timing.
      zh-CN: 我们相信我们拿对了股票。问题从来不是论点，而是时点。
      zh-HK: 我們相信我們拿對了股票。問題從來不是論點，而是時點。
  - text:
      en: If you're not willing to look wrong, you won't capture the upside.
      zh-CN: 如果你承受不了看起来很蠢，就抓不住最大的那波涨幅。
      zh-HK: 如果你承受不了看起來很蠢，就抓不住最大的那波漲幅。

