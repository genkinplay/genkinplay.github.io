bio:
  en: A circulating tumor cell (CTC) is a cancer cell from a primary tumor that has shed into the blood of the circulatory system, or the lymph of the lymphatic system. The circulatory system is a highly toxic environment for CTCs, and they must make significant adaptations to survive. If CTCs successfully adapt to the physical and biological threats of the circulatory system, they will be carried around the body to other organs where they may leave the circulation. When CTCs exit circulation they become the seeds for the subsequent growth of secondary tumors. This is known as metastasis, which is responsible for most cancer-related deaths.
