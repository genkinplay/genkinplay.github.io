bio:
  en: Earnest Lee Ross Jr. is an American professional basketball player for Shonan United of the B.League. Born in the U.S. territory of Guam, he represents the Guam national team in international competition. He played college basketball for Auburn and Missouri before beginning his professional career in Australia in 2014. He went on to play in Denmark, New Zealand, Qatar, the NBA G League, Japan, and Mongolia.
  zh-CN: 小欧内斯特·李·罗斯（英语：Earnest Lee Ross Jr.，1991年1月27日—）为关岛男子篮球运动员，最后效力于台湾职业篮球大联盟桃园台啤永丰云豹。
  zh-HK: 小歐內斯特·李·羅斯（英語：Earnest Lee Ross Jr.，1991年1月27日—）為關島男子籃球運動員，最後效力於台灣職業籃球大聯盟桃園台啤永豐雲豹。
