bio:
  en: Harris Associates L.P. is a Chicago-based investment company with $96 billion under management as of June 30, 2025. Harris manages long-only U.S. equity, international equity, and global equity strategies, offered through its mutual fund company, the Oakmark Funds, and other types of vehicles. Harris is owned by Natixis Investment Managers, an American-French financial services firm that BPCE owns. Harris Associates fully controls investment decisions, philosophy, and day-to-day operations.
  zh-CN: |-
    哈里森·福特（英语：Harrison Ford，1942年7月13日—）是美国男演员。他最著名的角色包括《星球大战》中的韩·索罗、《夺宝奇兵》中的印第安纳·琼斯、瑞克·戴克和杰克·莱恩。
    此外他还在多部好莱坞非常成功的作品中上演角色，其中包括《空军一号》和《亡命天涯》，这些角色与《星球大战》和《夺宝奇兵》中的角色非常不同。有一段时间里世界上最卖座的五部电影片里均有福特的角色。哈里森·福特的电影中有五部被收入国家电影目录。
    2006年9月为止哈里森·福特出演的电影在美国总票房约31亿美元，在全世界估计达60亿美元，仅次于汤姆·汉克斯。
    2016年1月为止，哈里森·福特重回了电影票房总排行榜上第二名，仅次于塞缪尔·杰克逊。
  zh-HK: |-
    夏里遜·福（英語：Harrison Ford，1942年7月13日—）是美國男演員。他最著名的角色包括《星球大戰》中的韓·索羅、《奪寶奇兵》中的鍾英迪、瑞克·戴克和杰克·雷恩。
    此外他還在多部荷里活非常成功的作品中上演角色，其中包括《空軍一號》和《亡命天涯》，這些角色與《星球大戰》和《奪寶奇兵》中的角色非常不同。有一段時間裏世界上最賣座的五部電影片里均有福的角色。夏里遜·福的電影中有五部被收入國家電影目錄。
    2006年9月為止夏里遜·福演出的電影在美國總票房約31億美元，在全世界估計達60億美元，僅次於湯·漢斯。
    2016年1月為止，夏里遜·福重回了電影票房總排行榜上第二名，僅次於森姆·積遜。
