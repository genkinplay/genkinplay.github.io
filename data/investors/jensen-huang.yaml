bio:
  en: |
    Jensen Huang, born in Tainan in 1963 and raised partly in Kentucky and Oregon, co-founded NVIDIA at a Denny's in 1993 with Chris Malachowsky and Curtis Priem. Thirty-two years later he is still CEO of what has become the single most important compute supplier of the AI era. Huang's early career at AMD and LSI Logic taught him silicon economics; NVIDIA's first decade taught him that the GPU had applications far beyond graphics.

    The decisive bet was CUDA in 2006 — a general-purpose programming model for GPUs that turned parallel compute into a developer platform. For years CUDA was derided as an expensive research project. By 2012 it was the substrate of AlexNet; by 2023 it was the moat underneath every frontier lab's training stack, and NVIDIA crossed $1 trillion in market cap. In 2024 it crossed $3 trillion.

    Huang is famous for a leather jacket, a flat 40-person direct-report structure, and a managerial style that treats strategy as a living pair of hands — "the mission is the boss." He still insists NVIDIA is a platform company first, silicon second.
  zh-CN: |
    黄仁勋，1963 年生于台南，少年时在肯塔基与俄勒冈长大，1993 年在一家 Denny's 餐厅与 Chris Malachowsky、Curtis Priem 共同创立英伟达。三十二年后，他仍担任 CEO，公司已成为 AI 时代最核心的算力供应商。他早年在 AMD 与 LSI Logic 的经历让他掌握了硅芯片的经济学；英伟达的头十年让他意识到，GPU 的用途远远不止图形渲染。

    决定性的一步是 2006 年推出的 CUDA——一套面向 GPU 的通用编程模型，把并行计算变成了一个开发者平台。多年里 CUDA 被视作烧钱的研究项目；2012 年它成为 AlexNet 的底座；2023 年它已是所有前沿实验室训练栈之下的护城河，英伟达市值突破 1 万亿美元，2024 年又突破 3 万亿美元。

    他以标志性的黑色皮夹克、多达 40 人的扁平直汇报结构，以及"Mission is the boss"式的管理风格闻名。他至今坚持：英伟达是一家平台公司，硅芯片只是副产品。
  zh-HK: |
    黃仁勳，1963 年生於台南，少年時在肯塔基與俄勒岡長大，1993 年在一家 Denny's 餐廳與 Chris Malachowsky、Curtis Priem 共同創辦輝達。三十二年後，他仍擔任 CEO，公司已成為 AI 時代最核心的算力供應商。他早年在 AMD 與 LSI Logic 的經歷讓他掌握了矽晶片的經濟學；輝達的頭十年讓他意識到，GPU 的用途遠遠不止圖形渲染。

    決定性的一步是 2006 年推出的 CUDA——一套面向 GPU 的通用程式設計模型，把平行運算變成了一個開發者平台。多年裡 CUDA 被視作燒錢的研究項目；2012 年它成為 AlexNet 的底座；2023 年它已是所有前沿實驗室訓練棧之下的護城河，輝達市值突破 1 萬億美元，2024 年又突破 3 萬億美元。

    他以標誌性的黑色皮夾克、多達 40 人的扁平直匯報結構，以及"Mission is the boss"式的管理風格聞名。他至今堅持：輝達是一家平台公司，矽晶片只是副產品。

philosophy:
  - icon: "🧭"
    title:
      en: Platform First, Silicon Second
      zh-CN: 先是平台，才是芯片
      zh-HK: 先是平台，才是晶片
    body:
      en: Ship hardware to create the software ecosystem that makes the next hardware unavoidable.
      zh-CN: 出硬件是为了养软件生态，生态长起来，下一代硬件就无可替代。
      zh-HK: 出硬體是為了養軟體生態，生態長起來，下一代硬體就無可替代。
  - icon: "♾️"
    title:
      en: Long-Termism as Survival
      zh-CN: 长期主义即生存本身
      zh-HK: 長期主義即生存本身
    body:
      en: CUDA took fifteen years to pay off. If you flinch, the platform dies.
      zh-CN: CUDA 花了十五年才看见回报。中途退缩，平台就散了。
      zh-HK: CUDA 花了十五年才看見回報。中途退縮，平台就散了。
  - icon: "🧱"
    title:
      en: Mission Is the Boss
      zh-CN: 使命才是老板
      zh-HK: 使命才是老闆
    body:
      en: Flat org, 40 direct reports; people follow the mission, not the manager.
      zh-CN: 扁平组织，四十人直汇报；员工追随使命，而不是管理者。
      zh-HK: 扁平組織，四十人直匯報；員工追隨使命，而不是管理者。

quotes:
  - text:
      en: Nobody wants you to succeed more than your competitors — because if you do, you force them to get better too.
      zh-CN: 没人比你的竞争对手更希望你成功——因为你成功，他们就被逼着也变强。
      zh-HK: 沒人比你的競爭對手更希望你成功——因為你成功，他們就被逼著也變強。
  - text:
      en: I hope suffering on you. I hope that you experience pain and suffering.
      zh-CN: 我希望你吃苦，我希望你经历痛苦——因为这是性格长出来的地方。
      zh-HK: 我希望你吃苦，我希望你經歷痛苦——因為這是性格長出來的地方。
    source: Stanford GSB commencement
    year: 2024
  - text:
      en: The more you buy, the more you save.
      zh-CN: 买得越多，省得越多。
      zh-HK: 買得越多，省得越多。
    source: GTC keynote
    year: 2024

