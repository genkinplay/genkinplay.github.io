      zh-CN: 通过家族办公室以个人身份投资 AI 基础设施创业公司，包括 CoreWeave 等；大部分信息只在被投公司提交 S-1 时才被披露。
      zh-HK: 透過家族辦公室以個人身份投資 AI 基礎設施創業公司，包括 CoreWeave 等；大部分資訊只在被投公司提交 S-1 時才被披露。
