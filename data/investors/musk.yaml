bio:
  en: |
    Elon Musk, born in Pretoria in 1971, runs what is probably the most concentrated portfolio of operational bets in modern business: Tesla (EVs, energy storage, robotics), SpaceX (launch, Starlink, Starship), xAI (foundation models), Neuralink (brain-computer interfaces) and The Boring Company. He sold his stake in Zip2 in 1999 and co-founded X.com, which merged into PayPal — the 2002 eBay acquisition funded his entry into Tesla and SpaceX.

    Tesla, which Musk joined as chairman and lead investor in 2004 and as CEO in 2008, went from near-bankruptcy in 2009 to becoming the world's most valuable automaker by 2021. SpaceX, started on money Musk said he had "seven figures" of runway for, is now the dominant orbital launch provider, with Starlink serving millions of subscribers. In 2022 Musk bought Twitter for $44 billion, renamed it X, and folded it into a broader "everything app" ambition alongside xAI.

    Whether viewed as industrialist, provocateur or both, Musk's method is unusually consistent: reason from physics, compress schedules, vertically integrate, and treat public communication — including the controversies — as part of the strategy.
  zh-CN: |
    埃隆·马斯克，1971 年生于南非比勒陀利亚，名下同时运行着当今最集中的一组产业豪赌：特斯拉（电动车、储能、机器人）、SpaceX（火箭发射、星链、星舰）、xAI（基础模型）、Neuralink（脑机接口）与 The Boring Company（隧道）。他 1999 年卖掉 Zip2，随后创办 X.com，与 Confinity 合并成 PayPal，2002 年被 eBay 收购的套现为他进入特斯拉与 SpaceX 提供了初始资本。

    特斯拉在 2004 年让他以董事长兼主要投资人身份加入、2008 年出任 CEO；2009 年濒临破产的公司，到 2021 年成为全球市值最高的车企。SpaceX 以他口中"七位数的跑道"起步，如今是全球最主要的轨道发射商，星链覆盖数百万用户。2022 年他以 440 亿美元收购推特，改名 X，并与 xAI 整合进"万能应用"叙事。

    无论把他看作工业家、煽动者还是两者兼备，他的方法论意外地一致：从物理第一性原理出发，压缩项目时间表，推行垂直整合，并把公开发声——包括争议——当作战略的一部分。
  zh-HK: |
    埃隆·馬斯克，1971 年生於南非比勒陀利亞，名下同時運行著當今最集中的一組產業豪賭：特斯拉（電動車、儲能、機器人）、SpaceX（火箭發射、星鏈、星艦）、xAI（基礎模型）、Neuralink（腦機介面）與 The Boring Company（隧道）。他 1999 年賣掉 Zip2，隨後創辦 X.com，與 Confinity 合併成 PayPal，2002 年被 eBay 收購的套現為他進入特斯拉與 SpaceX 提供了初始資本。

    特斯拉在 2004 年讓他以董事長兼主要投資人身份加入、2008 年出任 CEO；2009 年瀕臨破產的公司，到 2021 年成為全球市值最高的車企。SpaceX 以他口中"七位數的跑道"起步，如今是全球最主要的軌道發射商，星鏈覆蓋數百萬用戶。2022 年他以 440 億美元收購推特，改名 X，並與 xAI 整合進"萬能應用"敘事。

    無論把他看作工業家、煽動者還是兩者兼備，他的方法論意外地一致：從物理第一性原理出發，壓縮項目時間表，推行垂直整合，並把公開發聲——包括爭議——當作戰略的一部分。

philosophy:
  - icon: "⚛️"
    title:
      en: First-Principles Reasoning
      zh-CN: 第一性原理
      zh-HK: 第一性原理
    body:
      en: Strip a problem down to physics and costs, then rebuild from scratch — not from analogy.
      zh-CN: 把问题拆到物理与成本的最底层，从头搭起来，而不是靠类比。
      zh-HK: 把問題拆到物理與成本的最底層，從頭搭起來，而不是靠類比。
  - icon: "🏗️"
    title:
      en: Vertical Integration
      zh-CN: 垂直整合
      zh-HK: 垂直整合
    body:
      en: If the supply chain is the bottleneck, make the supply chain.
      zh-CN: 如果供应链是瓶颈，那就自己做供应链。
      zh-HK: 如果供應鏈是瓶頸，那就自己做供應鏈。
  - icon: "⏱️"
    title:
      en: Compress the Schedule
      zh-CN: 压缩时间表
      zh-HK: 壓縮時間表
    body:
      en: Set a deadline that looks insane, miss it by less than the competition, ship anyway.
      zh-CN: 设一个看起来疯狂的截止日期，比竞争对手少延误一点点，照样发货。
      zh-HK: 設一個看起來瘋狂的截止日期，比競爭對手少延誤一點點，照樣發貨。

quotes:
  - text:
      en: When something is important enough, you do it even if the odds are not in your favor.
      zh-CN: 当一件事足够重要，哪怕胜算不在你这边，你也照做。
      zh-HK: 當一件事足夠重要，哪怕勝算不在你這邊，你也照做。
  - text:
      en: The first step is to establish that something is possible; then probability will occur.
      zh-CN: 第一步是确认事情"可能"，概率随后自会发生。
      zh-HK: 第一步是確認事情"可能"，概率隨後自會發生。
  - text:
      en: I would like to die on Mars. Just not on impact.
      zh-CN: 我希望死在火星上。只是别撞上去死。
      zh-HK: 我希望死在火星上。只是別撞上去死。

