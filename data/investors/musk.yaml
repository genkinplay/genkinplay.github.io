notable_holdings:
  - name: Tesla (TSLA)
    kind: Listed equity
    note:
      en: Roughly 13% ownership via common shares plus vested options. Musk's single largest public-market position; disclosed through Form 4 filings.
      zh-CN: 约 13% 股权，由普通股加已归属期权构成；马斯克公开市场最大单一仓位，通过 Form 4 披露。
      zh-HK: 約 13% 股權，由普通股加已歸屬期權構成；馬斯克公開市場最大單一倉位，透過 Form 4 披露。
    disclosure_url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001494730&type=4
  - name: SpaceX
    kind: Private company
    note:
      en: Majority owner and CEO; SpaceX's 2024 tender valuations placed the company around $350B, making this stake Musk's most valuable asset.
      zh-CN: 多数股东兼 CEO；2024 年老股收购把 SpaceX 估值推到约 3500 亿美元，是马斯克最值钱的资产。
      zh-HK: 多數股東兼 CEO；2024 年老股收購把 SpaceX 估值推到約 3,500 億美元，是馬斯克最值錢的資產。
  - name: xAI
    kind: Private company
    note:
      en: Founder and controlling shareholder; xAI raised at a reported $50B+ valuation in 2024 and has been merged with X Corp.
      zh-CN: 创始人与控股股东；xAI 2024 年融资估值据报道超 500 亿美元，已与 X Corp 合并。
      zh-HK: 創辦人與控股股東；xAI 2024 年融資估值據報道超 500 億美元，已與 X Corp 合併。
  - name: X Corp (formerly Twitter)
    kind: Private company
    note:
      en: Wholly owned after the $44B 2022 take-private; debt-heavy but positioned as the distribution layer for xAI's Grok.
      zh-CN: 2022 年 440 亿美元私有化后全资拥有；负债较重，被定位为 xAI 旗下 Grok 的分发层。
      zh-HK: 2022 年 440 億美元私有化後全資擁有；負債較重，被定位為 xAI 旗下 Grok 的分發層。
