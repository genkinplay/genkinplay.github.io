bio:
  en: Ninety One is an Anglo-South African asset management business, based in London and Cape Town, and cross-listed on the London Stock Exchange and the Johannesburg Stock Exchange. It is a constituent of the FTSE 250 index.
  zh-CN: |-
    NINETY-NINE（日语：ナインティナイン）是日本搞笑二人组，由冈村隆史（负责“装傻”的角色）和矢部浩之（负责“找碴、吐槽”）两人组成。所属经纪公司是吉本兴业东京本社。简称“ナイナイ”、“99”、“NN”。
    1990年结成组合，不久之后知名度大涨、跃升为一线搞笑组合，在同时期的谐星中最先成名。NINETY-NINE从1990年代末就已专注于主持自己的节目、逐渐减少接受其他节目通告，成为艺能界的大御所。此双人组曾主持过像是《五花八门浅草桥》（ASAYAN，其选秀单元捧红了像是早安少女组。、铃木亚美、化学超男子等知名艺人）这般的高知名度节目，而近期的代表性主持节目则有《GURU GURU 99》、《帅呆了！》（めちゃ×2イケてるッ!）等。
  zh-HK: |-
    NINETY-NINE（日語：ナインティナイン）是日本搞笑二人組，由岡村隆史（負責「裝傻」的角色）和矢部浩之（負責「找碴、吐槽」）兩人組成。所屬經紀公司是吉本興業東京本社。簡稱「ナイナイ」、「99」、「NN」。
    1990年結成組合，不久之後知名度大漲、躍升為一線搞笑組合，在同時期的諧星中最先成名。NINETY-NINE從1990年代末就已專注於主持自己的節目、逐漸減少接受其他節目通告，成為藝能界的大御所。此雙人組曾主持過像是《五花八門淺草橋》（ASAYAN，其選秀單元捧紅了像是早安少女組。、鈴木亞美、化學超男子等知名藝人）這般的高知名度節目，而近期的代表性主持節目則有《GURU GURU 99》、《帥呆了！》（めちゃ×2イケてるッ!）等。
