bio:
  en: PRIMECAP Management Company (Primecap) is an American investment management firm based in Pasadena, California. The firm is known for managing US-focused equity portfolios for The Vanguard Group (Vanguard). In 2004, it launched its own mutual funds, the Odyssey Funds. In addition, it also handles separately managed accounts for institutional investors.
