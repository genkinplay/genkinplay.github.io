bio:
  en: Pzena Investment Management (Pzena) is an American investment management firm. Its expertise is in deep value investing. It oversees assets under management for institutions, High-net-worth individuals and mutual funds. The company is headquartered in New York City and has offices in London, Melbourne and Dublin.
