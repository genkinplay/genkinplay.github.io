notable_holdings:
  - name: OpenAI
    kind: AI lab (capped-profit)
    note:
      en: Officially, Altman holds no direct economic interest in OpenAI; his influence is exercised through the CEO role and governance, not through equity.
      zh-CN: 官方披露：Altman 在 OpenAI 无直接经济权益，其影响力来自 CEO 职位与治理结构，而非股权。
      zh-HK: 官方披露：Altman 在 OpenAI 無直接經濟權益，其影響力來自 CEO 職位與治理結構，而非股權。
    disclosure_url: https://openai.com/our-structure
  - name: Helion Energy
    kind: Private company
    note:
      en: Chairman and largest investor; $375M lead in 2021. Altman's biggest personal bet, targeting commercial fusion electricity with a first MSFT PPA.
      zh-CN: 董事长兼最大投资人；2021 年领投 3.75 亿美元，Altman 最大的个人押注，目标是商用聚变电力，与微软签下首份购电协议。
      zh-HK: 董事長兼最大投資人；2021 年領投 3.75 億美元，Altman 最大的個人押注，目標是商用聚變電力，與微軟簽下首份購電協議。
    disclosure_url: https://www.helionenergy.com/
  - name: Reddit (RDDT)
    kind: Listed equity
    note:
      en: Early and sizable pre-IPO backer; at the 2024 IPO Altman disclosed ~8.7% ownership, making him one of Reddit's largest outside holders.
      zh-CN: 早期大额投资者；2024 年 IPO 时披露约 8.7% 股份，是 Reddit 最大的外部股东之一。
      zh-HK: 早期大額投資者；2024 年 IPO 時披露約 8.7% 股份，是 Reddit 最大的外部股東之一。
    disclosure_url: https://www.sec.gov/Archives/edgar/data/1713445/000162828024009743/
  - name: Retro Biosciences
    kind: Private company
    note:
      en: Altman personally funded Retro with $180M in 2022 to extend healthy human lifespan by 10 years — one of the larger solo checks in biotech history.
      zh-CN: 2022 年以 1.8 亿美元个人出资支持 Retro，目标是让健康寿命延长 10 年——生物科技史上最大个人出资之一。
      zh-HK: 2022 年以 1.8 億美元個人出資支持 Retro，目標是讓健康壽命延長 10 年——生物科技史上最大個人出資之一。
