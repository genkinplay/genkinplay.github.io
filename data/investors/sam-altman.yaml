bio:
  en: |
    Sam Altman, born in Chicago in 1985 and raised in St. Louis, dropped out of Stanford in 2005 to start Loopt, a YC-backed location app sold to Green Dot in 2012. He joined Y Combinator as a part-time partner that year, took over as president in 2014, and expanded YC into a continuous-capital vehicle that seeded Stripe, Airbnb, DoorDash, Instacart and Coinbase during his tenure.

    In 2015 he co-founded OpenAI with Elon Musk and others, originally as a non-profit, and became CEO of the capped-profit subsidiary when Musk exited the board in 2018. Under Altman, OpenAI shipped GPT-3 (2020), ChatGPT (late 2022), and GPT-4 (2023), turning frontier language models from a research curiosity into the most rapidly adopted consumer technology ever measured. A five-day November 2023 board coup — and his reinstatement — became the defining AI corporate-governance story of the decade.

    Notably, OpenAI has publicly stated Altman holds no direct equity in the company; his influence is structural rather than financial. Outside OpenAI, he is an active personal investor — notably the chairman and largest backer of Helion Energy — and an unusually loud advocate for the political economy of post-scarcity abundance.
  zh-CN: |
    萨姆·奥特曼，1985 年生于芝加哥，在圣路易斯长大，2005 年从斯坦福辍学创办 YC 孵化的位置类应用 Loopt，2012 年卖给 Green Dot。同年他以兼职合伙人身份加入 YC，2014 年出任总裁，把 YC 扩展为一个持续资本平台，在任期内孵化了 Stripe、Airbnb、DoorDash、Instacart、Coinbase 等一代公司。

    2015 年他与 Elon Musk 等人共同创立 OpenAI，最初是非营利组织；2018 年 Musk 离开董事会后，他出任其"利润上限"子公司的 CEO。在他任内，OpenAI 先后发布 GPT-3（2020）、ChatGPT（2022 年底）、GPT-4（2023），把前沿大语言模型从研究珍品变成历史上采用速度最快的消费科技。2023 年 11 月的"五天董事会政变"以及他的回归，成为这个十年最具代表性的 AI 公司治理事件。

    值得注意的是，OpenAI 公开声明 Altman 在公司没有直接股权——他的影响力更多来自治理与领导力，而非持股。公司之外，他是一位活跃的个人投资人，尤其是 Helion Energy 的董事长与最大支持者，并公开倡导"后稀缺时代"的政治经济叙事。
  zh-HK: |
    山姆·奧特曼，1985 年生於芝加哥，在聖路易斯長大，2005 年從史丹佛輟學創辦 YC 孵化的位置類應用 Loopt，2012 年賣給 Green Dot。同年他以兼職合夥人身份加入 YC，2014 年出任總裁，把 YC 擴展為一個持續資本平台，在任期內孵化了 Stripe、Airbnb、DoorDash、Instacart、Coinbase 等一代公司。

    2015 年他與 Elon Musk 等人共同創立 OpenAI，最初是非營利組織；2018 年 Musk 離開董事會後，他出任其"利潤上限"子公司的 CEO。在他任內，OpenAI 先後發佈 GPT-3（2020）、ChatGPT（2022 年底）、GPT-4（2023），把前沿大語言模型從研究珍品變成歷史上採用速度最快的消費科技。2023 年 11 月的"五天董事會政變"以及他的回歸，成為這個十年最具代表性的 AI 公司治理事件。

    值得注意的是，OpenAI 公開聲明 Altman 在公司沒有直接股權——他的影響力更多來自治理與領導力，而非持股。公司之外，他是一位活躍的個人投資人，尤其是 Helion Energy 的董事長與最大支持者，並公開倡導"後稀缺時代"的政治經濟敘事。

philosophy:
  - icon: "🧠"
    title:
      en: AGI Is Near
      zh-CN: AGI 离我们很近
      zh-HK: AGI 離我們很近
    body:
      en: Plan for the scenario where general-purpose AI arrives this decade — policy, compute, energy.
      zh-CN: 按"通用人工智能在这个十年内到来"来规划：政策、算力、能源。
      zh-HK: 按"通用人工智能在這個十年內到來"來規劃：政策、算力、能源。
  - icon: "🌾"
    title:
      en: Abundance Thesis
      zh-CN: 丰饶叙事
      zh-HK: 豐饒敘事
    body:
      en: Cost of intelligence and cost of energy both falling toward zero reshape every other market.
      zh-CN: 智能与能源的边际成本同步趋零，其他所有市场都会被重写。
      zh-HK: 智能與能源的邊際成本同步趨零，其他所有市場都會被重寫。
  - icon: "🤝"
    title:
      en: Founder-Friendly Capital
      zh-CN: 对创始人友好的资本
      zh-HK: 對創辦人友好的資本
    body:
      en: The rarest asset is a great founder — structure deals so they can stay in the driver's seat.
      zh-CN: 最稀缺的资源是好创始人——条款要让他们继续坐在驾驶座上。
      zh-HK: 最稀缺的資源是好創辦人——條款要讓他們繼續坐在駕駛座上。

quotes:
  - text:
      en: The best founders just have a different relationship with reality.
      zh-CN: 最好的创始人，跟"现实"有一种不一样的关系。
      zh-HK: 最好的創辦人，跟"現實"有一種不一樣的關係。
  - text:
      en: A decade ago, the conventional wisdom was that AI would take the physical jobs first. It looks like the opposite.
      zh-CN: 十年前人们以为 AI 会先取代体力劳动，事实看上去正好相反。
      zh-HK: 十年前人們以為 AI 會先取代體力勞動，事實看上去正好相反。
  - text:
      en: Iterative deployment is how you give society time to adapt.
      zh-CN: 渐进发布，是给社会留出适应时间的方式。
      zh-HK: 漸進發佈，是給社會留出適應時間的方式。

