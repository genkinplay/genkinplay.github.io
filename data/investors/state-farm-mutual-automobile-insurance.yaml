bio:
  en: State Farm Mutual Automobile Insurance Co. v. Campbell, 538 U.S. 408 (2003), was a case in which the United States Supreme Court held that the Due Process Clause usually limits punitive damage awards to less than ten times the size of the compensatory damages awarded and that punitive damage awards of four times the compensatory damage award is "close to the line of constitutional impropriety".
  zh-CN: |-
    州立农业保险（State Farm Insurance）是一家美国相互保险集团，总部位于伊利诺伊州布卢明顿，成立于1922年。它是美国最大的财产、意外和汽车保险提供商。
    州立农业在2022年财富美国500强中排名第42位。
  zh-HK: |-
    州立農業保險（State Farm Insurance）是一家美國相互保險集團，總部位於伊利諾伊州布盧明頓，成立於1922年。它是美國最大的財產、意外和汽車保險提供商。
    州立農業在2022年財富美國500強中排名第42位。
