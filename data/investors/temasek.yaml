bio:
  en: Temasek Holdings (Private) Limited is a Singaporean state-owned multinational investment firm. Incorporated on 25 June 1974, Temasek has a net portfolio of S$484 billion as of 31 March 2025. Headquartered at Orchard Road, Singapore, it has 13 offices in nine countries around the world, including in Beijing, Brussels, Hanoi, London, Mexico City, Mumbai, New York City, Paris, San Francisco, Shanghai, Shenzhen, and Washington D.C.
