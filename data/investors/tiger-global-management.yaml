bio:
  en: Tiger Global Management, LLC is an American investment firm founded by Chase Coleman III, a former Tiger Management employee under Julian Robertson, in March 2001. It mainly focuses on internet, software, consumer, and financial technology companies.
  zh-CN: 老虎全球管理（Tiger Global Management, LLC，简称Tiger Global）是一家美国投资公司。该公司主要关注互联网、软件、消费和金融科技行业，成立于2001年3月。2007年至2017年间，根据Preqin的创投报告，老虎全球管理的融资额在所有风险投资公司中是最高的。
  zh-HK: 老虎全球管理（Tiger Global Management, LLC，簡稱Tiger Global）是一家美國投資公司。該公司主要關注互聯網、軟件、消費和金融科技行業，成立於2001年3月。2007年至2017年間，根據Preqin的創投報告，老虎全球管理的融資額在所有風險投資公司中是最高的。
