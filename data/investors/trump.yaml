notable_holdings:
  - name: Trump Media & Technology Group (DJT)
    kind: Listed equity
    note:
      en: Parent of the Truth Social platform; Trump is the controlling shareholder, holding roughly 53% of DJT shares as disclosed in 2024 filings. His stake is held via a revocable trust.
      zh-CN: Truth Social 的母公司；按 2024 年披露，特朗普通过可撤销信托持有约 53% 的 DJT 股份，为控股股东。
      zh-HK: Truth Social 的母公司；按 2024 年披露，特朗普透過可撤銷信託持有約 53% 的 DJT 股份，為控股股東。
    disclosure_url: https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001849635&type=4
  - name: The Trump Organization
    kind: Private real estate
    note:
      en: Privately held real-estate, hotel, golf, and brand-licensing group founded by his father; operates properties and licensing deals globally. Audited ownership disclosed in federal financial-disclosure filings.
      zh-CN: 由其父创办的私人控股集团，业务覆盖房地产、酒店、高尔夫及品牌授权；持股细节在联邦财产申报中披露。
      zh-HK: 由其父創辦的私人控股集團，業務覆蓋房地產、酒店、高爾夫及品牌授權；持股細節在聯邦財產申報中披露。
  - name: Mar-a-Lago Club
    kind: Private real estate
    note:
      en: Palm Beach, Florida private club purchased in 1985; serves as Trump's primary residence and a central asset within The Trump Organization portfolio.
      zh-CN: 1985 年购入的佛罗里达棕榈滩私人俱乐部；既是特朗普主要居所，也是 Trump Organization 旗下核心资产之一。
      zh-HK: 1985 年購入的佛羅里達棕櫚灘私人俱樂部；既是特朗普主要居所，也是 Trump Organization 旗下核心資產之一。
