bio:
  en: Viking Global Investors is an American investment management firm headquartered in Stamford, Connecticut that specializes in long-short equity, long-only equity, and private equity strategies.
  zh-CN: 维京足球俱乐部（挪威语：Viking Fotballklubb）是一间位于斯塔万格的挪威足球俱乐部，于1899年8月10日成立，因为在当地，足球开始变得普及。维京是挪威俱乐部中的贵族，八次赢得挪威足球超级联赛冠军(上一次在1991年)，和五次赢得挪威杯冠军。维京赢得顶级联赛的次数，比其他球队都多。而维京自联赛制度成立以来，除了1966-1967年和1987-1988年外，一直都在顶级联赛角逐。最近一次于欧洲赛出名，是在2002-2003年的欧洲足联杯，淘汰了英超劲旅切尔西。
  zh-HK: 維京足球會（挪威語：Viking Fotballklubb）是一間位於斯塔萬格的挪威足球球會，於1899年8月10日成立，因為在當地，足球開始變得普及。維京是挪威球會中的貴族，八次贏得挪威超級足球聯賽冠軍(上一次在1991年)，和五次贏得挪威盃冠軍。維京贏得頂級聯賽的次數，比其他球隊都多。而維京自聯賽制度成立以來，除了1966-1967年和1987-1988年外，一直都在頂級聯賽角逐。最近一次於歐洲賽出名，是在2002-2003年的歐洲足協盃，淘汰了英超勁旅車路士。
