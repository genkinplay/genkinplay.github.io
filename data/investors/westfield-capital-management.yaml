bio:
  en: Capital Mall is a shopping mall located in Olympia, Washington. The anchor stores are REI, Total Wine & More, Macy's, Dick's Sporting Goods, JCPenney, Best Buy, and Century Theatres. The mall was known as Westfield Capital from 1998 to 2013, when it was owned by the Westfield Group. In 2013, Starwood Capital Group purchased the mall and owned it until 2020; it is now managed by Pacific Retail Capital Partners.
