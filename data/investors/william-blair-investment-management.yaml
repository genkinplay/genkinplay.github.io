  en: William Blair Bruce was a Canadian painter. He studied in France and became one of Canada's first impressionist painters. He lived most of his life in France and on the island of Gotland, Sweden, where he and his Swedish wife Carolina Benedicks-Bruce created the artists estate Brucebo, which was later established as a nature reserve.
