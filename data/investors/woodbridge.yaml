bio:
  en: 'Woodbridge is a town in New Haven County, Connecticut, United States. The town is part of the South Central Connecticut Planning Region. The population was 9,087 at the 2020 census. The town center is listed on the National Register of Historic Places as Woodbridge Green Historic District. Woodbridge is part of the Amity Regional School District #5, rated the #1 school district in New Haven County and the 10th best school district in Connecticut by Niche in 2021. As of 2019, Woodbridge had the seventh highest median household income in Connecticut.'
